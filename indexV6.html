<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexalovers • Extractor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen p-4 flex flex-col items-center justify-center">

    <div class="w-full max-w-xl bg-gray-900 border border-purple-500/20 rounded-2xl p-6 shadow-2xl space-y-6 backdrop-blur-md">
        
        <div class="text-center border-b border-gray-800 pb-4">
            <h1 class="text-xl font-black uppercase tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
                🚀 NexaExtractor & Clean Engine
            </h1>
            <p class="text-xs text-gray-400 mt-1">Formatos soportados: TXT, CSV, XLSX, ZIP, PNG, JPG</p>
        </div>

        <div class="space-y-2">
            <label class="text-xs font-bold uppercase text-purple-400 block">📥 Inyectar Archivo o Lote</label>
            <div class="border-2 border-dashed border-gray-700 hover:border-purple-500/50 rounded-xl p-6 text-center cursor-pointer relative bg-gray-950 transition-colors">
                <input type="file" id="fileInyector" accept=".txt,.csv,.xlsx,.xls,.zip,image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="procesarArchivoInyectado(this)">
                <p id="lblStatusArchivo" class="text-xs text-gray-400 font-medium">Arrastra tu archivo aquí o haz clic para buscar</p>
            </div>
        </div>

        <div id="bloqueProgreso" class="hidden bg-gray-950 p-3 rounded-xl border border-gray-850 space-y-2">
            <div class="flex justify-between items-center text-xs">
                <span id="lblEstadoProceso" class="text-amber-400 font-mono animate-pulse">⚙️ Analizando estructura...</span>
                <span id="lblPorcentaje" class="font-bold text-purple-400">0%</span>
            </div>
            <div class="w-full bg-gray-850 h-1.5 rounded-full overflow-hidden">
                <div id="barraProgreso" class="bg-gradient-to-r from-purple-500 to-pink-500 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="bg-gray-950 p-3 border border-gray-850 rounded-xl text-center">
                <span class="text-[10px] text-gray-500 uppercase font-bold block">Detectados Totales</span>
                <span id="txtContadorBruto" class="text-xl font-black font-mono text-gray-300">0</span>
            </div>
            <div class="bg-gray-950 p-3 border border-purple-500/20 rounded-xl text-center">
                <span class="text-[10px] text-purple-400 uppercase font-bold block">Únicos Limpios (10D)</span>
                <span id="txtContadorUnicos" class="text-xl font-black font-mono text-pink-400">0</span>
            </div>
        </div>

        <div class="flex gap-2">
            <button onclick="subirBaseGeneralFirebase()" id="btnGuardarNube" disabled class="flex-1 bg-gradient-to-r from-purple-600 to-pink-600 disabled:from-gray-800 disabled:to-gray-800 disabled:text-gray-500 text-white text-xs font-black uppercase tracking-widest py-3 rounded-xl transition-all shadow-lg">
                💾 Inyectar a Base General
            </button>
            <button onclick="exportarListaLimpiaCSV()" id="btnExportar" disabled class="bg-gray-800 disabled:bg-gray-900 disabled:text-gray-600 text-gray-200 text-xs font-bold px-4 rounded-xl transition-all">
                📥 Exportar
            </button>
        </div>
    </div>

    <script>
        // Configuración Firebase básica para tu Base General
        const firebaseConfig = { 
            apiKey: "AIzaSyAcMf1zfXLacvsNIz_QWS3-Yn23q0oPbLU", authDomain: "nexa-pilot.firebaseapp.com",
            projectId: "nexa-pilot", storageBucket: "nexa-pilot.firebasestorage.app",
            messagingSenderId: "218347360257", appId: "1:218347360257:web:8dd161377d83e017a47000"
        };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        let numerosUnicosEncontrados = new Set();

        // Actualización visual de la consola de carga
        function actualizarConsola(texto, porcentaje) {
            const bloque = document.getElementById('bloqueProgreso');
            bloque.classList.remove('hidden');
            document.getElementById('lblEstadoProceso').innerText = texto;
            document.getElementById('lblPorcentaje').innerText = `${porcentaje}%`;
            document.getElementById('barraProgreso').style.width = `${porcentaje}%`;
        }

        // MOTOR REGEX CORE: Detecta números limpiando prefijos 52/521 y formatos sucios
        function extraerYLimpiarNumeros(textoSucio) {
            // Reemplaza todo lo que no sea número o saltos de línea
            let soloNumeros = textoSucio.replace(/[^\d\n\r]/g, ' ');
            
            // Busca cadenas numéricas de entre 10 y 13 dígitos
            let coincidencias = soloNumeros.match(/\d{10,13}/g) || [];
            let totalDetectados = coincidencias.length;
            
            coincidencias.forEach(num => {
                let limpio = num;
                // Si inicia con prefijo mexicano, los removemos dinámicamente
                if (limpio.startsWith('521') && limpio.length > 10) {
                    limpio = limpio.substring(3);
                } else if (limpio.startsWith('52') && limpio.length > 10) {
                    limpio = limpio.substring(2);
                }
                
                // Asegurar que tras la limpieza tenga exactamente 10 dígitos
                if (limpio.length === 10) {
                    numerosUnicosEncontrados.add(limpio);
                }
            });

            document.getElementById('txtContadorBruto').innerText = totalDetectados;
            document.getElementById('txtContadorUnicos').innerText = numerosUnicosEncontrados.size;

            if(numerosUnicosEncontrados.size > 0) {
                document.getElementById('btnGuardarNube').disabled = false;
                document.getElementById('btnExportar').disabled = false;
            }
        }

        // Manejador centralizado de tipos de archivos inyectados
        async function procesarArchivoInyectado(input) {
            if (!input.files || !input.files[0]) return;
            const archivo = input.files[0];
            document.getElementById('lblStatusArchivo').innerText = `📄 ${archivo.name}`;
            numerosUnicosEncontrados.clear();
            
            actualizarConsola("📂 Abriendo archivo...", 20);
            const nombre = archivo.name.toLowerCase();

            if (nombre.endsWith('.txt') || nombre.endsWith('.csv')) {
                const lector = new FileReader();
                lector.onload = function(e) {
                    actualizarConsola("⚡ Procesando texto...", 70);
                    extraerYLimpiarNumeros(e.target.result);
                    actualizarConsola("✅ Extracción terminada", 100);
                };
                lector.readAsText(archivo);

            } else if (nombre.endsWith('.xlsx') || nombre.endsWith('.xls')) {
                const lector = new FileReader();
                lector.onload = function(e) {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    let textoAcumulado = "";
                    workbook.SheetNames.forEach(sheetName => {
                        textoAcumulado += XLSX.utils.sheet_to_txt(workbook.Sheets[sheetName]) + "\n";
                    });
                    actualizarConsola("⚡ Procesando celdas Excel...", 70);
                    extraerYLimpiarNumeros(textoAcumulado);
                    actualizarConsola("✅ Extracción terminada", 100);
                };
                lector.readAsArrayBuffer(archivo);

            } else if (nombre.endsWith('.zip')) {
                const lector = new FileReader();
                lector.onload = async function(e) {
                    const zip = await JSZip.loadAsync(e.target.result);
                    let textoCombinado = "";
                    for (let filename in zip.files) {
                        if (!zip.files[filename].dir && filename.match(/\.(txt|csv)$/i)) {
                            textoCombinado += await zip.files[filename].async("text") + "\n";
                        }
                    }
                    actualizarConsola("⚡ Extrayendo archivos ZIP...", 70);
                    extraerYLimpiarNumeros(textoCombinado);
                    actualizarConsola("✅ ZIP procesado con éxito", 100);
                };
                lector.readAsArrayBuffer(archivo);

            } else if (archivo.type.startsWith('image/')) {
                actualizarConsola("👁️ Ejecutando módulo OCR...", 40);
                Tesseract.recognize(archivo, 'spa', { logger: m => {
                    if(m.status === 'recognizing text') {
                        actualizarConsola("🔍 Escaneando imagen...", Math.floor(m.progress * 50) + 40);
                    }
                }}).then(({ data: { text } }) => {
                    extraerYLimpiarNumeros(text);
                    actualizarConsola("✅ Imagen analizada", 100);
                }).catch(err => {
                    alert("Error en módulo OCR: " + err.message);
                    actualizarConsola("❌ Error", 0);
                });
            }
        }

        // Guardado Batch en Firebase Firestore asegurando Unicidad
        async function subirBaseGeneralFirebase() {
            actualizarConsola("☁️ Conectando con Base General...", 30);
            const batch = db.batch();
            let contadorCarga = 0;

            for (let num of numerosUnicosEncontrados) {
                // Usamos el número a 10 dígitos como ID del documento para forzar la unicidad nativa
                const refDoc = db.collection('base_general_contactos').doc(`+52${num}`);
                batch.set(refDoc, {
                    telefono: `+52${num}`,
                    origen: "NexaExtractor",
                    fechaInyeccion: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                contadorCarga++;
                // Límite de transacciones batch por segundo en Firestore es de 500 operaciones
                if (contadorCarga >= 400) break; 
            }

            await batch.commit();
            actualizarConsola("🚀 ¡Base General Actualizada!", 100);
            alert(`Sincronización exitosa. Se procesaron los registros en la nube.`);
        }

        // Exportación rápida local
        function exportarListaLimpiaCSV() {
            let contenidoCsv = "Telefono\n" + Array.from(numerosUnicosEncontrados).map(n => `+52${n}`).join("\n");
            const blob = new Blob([contenidoCsv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "nexalovers_contactos_limpios.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
