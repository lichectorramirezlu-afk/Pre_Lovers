<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaEngine V6 Pro - Dashboard</title>
    <style>
        /* ESTILOS DE LA INTERFAZ NEXALOVERS SYSTEM */
        :root {
            --bg-principal: #0a0a0c;
            --bg-tarjetas: #121216;
            --rosa-nexa: #ff007f;
            --texto-blanco: #ffffff;
            --texto-gris: #a0a0ab;
            --verde-exito: #00ff66;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin: 10px 0 5px 0;
            color: var(--texto-blanco);
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }

        .version-tag {
            font-size: 11px;
            background: rgba(255, 0, 127, 0.2);
            color: var(--rosa-nexa);
            padding: 2px 8px;
            border-radius: 20px;
            width: fit-content;
            margin-bottom: 15px;
            font-weight: bold;
            border: 1px solid rgba(255, 0, 127, 0.4);
        }

        /* CONTADORES */
        .tarjeta-contadores {
            background-color: var(--bg-tarjetas);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            border: 1px solid #1f1f26;
        }

        .contador-item {
            text-align: center;
        }

        .contador-numero {
            font-size: 28px;
            font-weight: 800;
            color: var(--rosa-nexa);
        }

        .contador-numero.exito {
            color: var(--verde-exito);
        }

        .contador-etiqueta {
            font-size: 12px;
            color: var(--texto-gris);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* MONITOREO DE BARRA ROSA */
        .tarjeta-progreso {
            background-color: var(--bg-tarjetas);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #1f1f26;
        }

        .espera-segura-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .espera-segura-txt {
            font-size: 14px;
            color: var(--texto-blanco);
            font-weight: 500;
        }

        #espera-segura-timer {
            font-size: 16px;
            color: var(--rosa-nexa);
            font-weight: bold;
        }

        .contenedor-barra {
            background-color: #1c1c24;
            border-radius: 6px;
            height: 12px;
            width: 100%;
            overflow: hidden;
        }

        #barra-progreso-rosa {
            background: linear-gradient(90deg, #ff007f, #ff5e00);
            height: 100%;
            width: 0%;
            transition: width 0.3s linear;
        }

        /* ZONA DE CONTROL Y SUBIDA */
        .tarjeta-acciones {
            background-color: var(--bg-tarjetas);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid #1f1f26;
        }

        .input-archivo {
            background: #1c1c24;
            border: 2px dashed #33333f;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            color: var(--texto-gris);
            cursor: pointer;
        }

        .input-archivo:focus {
            border-color: var(--rosa-nexa);
        }

        button {
            background: linear-gradient(135deg, #ff007f 0%, #b30059 100%);
            color: var(--texto-blanco);
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
            transition: transform 0.1s ease;
        }

        button:active {
            transform: scale(0.98);
        }

        #consola-log {
            background: #000;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            color: #00ff66;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid #111;
        }
    </style>
</head>
<body>

    <div>
        <h1>NexaEngine V6 Pro</h1>
        <div class="version-tag">STANDALONE ENGINE I/O</div>
    </div>

    <!-- CONTADORES DE REGISTROS -->
    <div class="tarjeta-contadores">
        <div class="contador-item">
            <div id="contador-pendientes" class="contador-numero">0</div>
            <div class="contador-etiqueta">Pendientes</div>
        </div>
        <div class="contador-item">
            <div id="contador-listos" class="contador-numero exito">0</div>
            <div class="contador-etiqueta">Enviados</div>
        </div>
        <div class="contador-item">
            <div id="contador-total" class="contador-numero" style="color: #61afef;">0</div>
            <div class="contador-etiqueta">Total Base</div>
        </div>
    </div>

    <!-- MONITOR DE ESPERA SEGURA (BARRA ROSA) -->
    <div class="tarjeta-progreso">
        <div class="espera-segura-header">
            <span id="espera-segura-txt" class="espera-segura-txt">Motor listo. Esperando campaña...</span>
            <span id="espera-segura-timer">0s</span>
        </div>
        <div class="contenedor-barra">
            <div id="barra-progreso-rosa"></div>
        </div>
    </div>

    <!-- ACCIONES Y CARGA DE DATOS -->
    <div class="tarjeta-acciones">
        <!-- Simulación de importador rápido vía texto JSON para pruebas inmediatas en el cel -->
        <textarea id="json-input" placeholder='Pega aquí tu JSON de prueba o lista...' style="background: #1c1c24; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 6px; height: 60px; font-family: monospace; resize: none;"></textarea>
        
        <button onclick="procesarCampañaDirecta()">🚀 INICIAR FLUJO PROGRAMADO</button>
    </div>

    <!-- HISTORIAL INTERNO DE LOGS -->
    <div id="consola-log">Log del sistema: Esperando comandos...</div>

    <script>
        // ========================================================
        // NÚCLEO DE CONFIGURACIÓN DEL MENSAJE Y CANALES (CORREGIDO)
        // ========================================================
        const MENSAJE_BASE = "Hola, te dejo la invitación para unirte a nuestro grupo oficial exclusivo de NexaLovers. Este será el grupo responsable de asignarte tu usuario y contraseña gratuito para que hagas tu chamba más fácil 😜";
        const LINK_WHATSAPP_GRUPO = "https://chat.whatsapp.com/KQFECehvFsKA66vJiJtkqq";

        // Mapeo automático normalizado en minúsculas para interceptar campañas tipo ZIP
        const canalesPermanentes = {
            "loverian@s": LINK_WHATSAPP_GRUPO,
            "grupo vol-1": LINK_WHATSAPP_GRUPO, 
            "gpocom": LINK_WHATSAPP_GRUPO
        };

        let baseContactos = [];

        // Escribir logs en la miniconsola de la interfaz
        function logger(texto) {
            const consola = document.getElementById("consola-log");
            consola.innerHTML += `<br>> ${texto}`;
            consola.scrollTop = consola.scrollHeight;
        }

        // LIMPIEZA REGEX DE TELÉFONOS (Formatos 10, 12 o 13 dígitos con clave 52)
        function limpiarNumero(telefono) {
            let numLimpio = String(telefono).replace(/\D/g, ''); 
            if (numLimpio.startsWith('521')) {
                numLimpio = '52' + numLimpio.substring(3);
            }
            if (numLimpio.length === 10) {
                numLimpio = '52' + numLimpio;
            }
            return numLimpio;
        }

        // CONTROL DE DEMORA ALEATORIA (ANTI-BANEO HUMANO: 25s a 45s)
        function obtenerEsperaAleatoria(min = 25000, max = 45000) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // PROCESADOR Y DISPARADOR
        async function procesarCampañaDirecta() {
            // Purgar configuraciones obsoletas almacenadas en la caché del móvil
            localStorage.removeItem("nexa_data_v5");

            const inputRaw = document.getElementById("json-input").value;
            if(!inputRaw) {
                // Datos demo por si el cuadro está vacío al presionar el botón (Para testear rápido con tu número)
                baseContactos = [
                    { telefono: "525512345678", grupo: "Grupo Vol-1" },
                    { telefono: "5587654321", grupo: "loverian@s" }
                ];
                logger("Cargados registros de prueba por defecto.");
            } else {
                try {
                    baseContactos = JSON.parse(inputRaw);
                } catch(e) {
                    alert("Formato de lista no válido. Verifica tu JSON.");
                    return;
                }
            }

            let total = baseContactos.length;
            document.getElementById("contador-total").innerText = total;
            document.getElementById("contador-pendientes").innerText = total;

            logger(`Iniciando inyección directa para ${total} registros de forma secuencial...`);

            for (let i = 0; i < total; i++) {
                let contacto = baseContactos[i];
                
                // Normalización de canales para evitar "Canal sin link asignado"
                let tagCanal = (contacto.grupo || "Grupo Vol-1").toLowerCase().trim();
                let linkDestino = canalesPermanentes[tagCanal];

                if (!linkDestino) {
                    logger(`Advertencia: Canal "${contacto.grupo}" no asignado. Usando enlace raíz.`);
                    linkDestino = LINK_WHATSAPP_GRUPO;
                }

                let numeroLimpio = limpiarNumero(contacto.telefono || contacto.numero);
                let mensajeCompleto = `${MENSAJE_BASE} ${linkDestino}`;
                
                // Esquema wa.me para inyección limpia a través del navegador Chrome hacia la App
                let urlWaMe = `https://wa.me/${numeroLimpio}?text=${encodeURIComponent(mensajeCompleto)}`;

                document.getElementById("espera-segura-txt").innerText = `Inyectando a: +${numeroLimpio}`;
                logger(`Enviando chat directo a +${numeroLimpio}`);

                // EJECUCIÓN DIRECTA: Abre la pestaña y fuerza el disparo
                window.open(urlWaMe, '_blank');

                // Actualizar contadores del sistema
                let listos = i + 1;
                let pendientes = total - listos;
                document.getElementById("contador-listos").innerText = listos;
                document.getElementById("contador-pendientes").innerText = pendientes;

                // Gestión de la barra rosa de cuenta regresiva (No aplica al último elemento)
                if (i < total - 1) {
                    let tiempoEspera = obtenerEsperaAleatoria(25000, 45000); 
                    let segundosRestantes = Math.round(tiempoEspera / 1000);
                    
                    logger(`Esperando protección anti-baneo: ${segundosRestantes} segundos...`);

                    while (segundosRestantes > 0) {
                        // Animación fluida de la barra rosa en tu pantalla
                        document.getElementById("barra-progreso-rosa").style.width = `${(segundosRestantes / (tiempoEspera/1000)) * 100}%`;
                        document.getElementById("espera-segura-timer").innerText = `${segundosRestantes}s`;
                        
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        segundosRestantes--;
                    }
                }
            }

            document.getElementById("espera-segura-txt").innerText = "¡Campaña finalizada con éxito!";
            document.getElementById("barra-progreso-rosa").style.width = "100%";
            logger("Proceso completado al 100% de forma segura.");
            alert("Flujo terminado de forma real.");
        }
    </script>
</body>
</html>
