<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaEngine V6 Pro - Extractor Inteligente</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-principal: #0a0a0c;
            --bg-tarjetas: #121216;
            --rosa-nexa: #ff007f;
            --texto-blanco: #ffffff;
            --texto-gris: #a0a0ab;
            --verde-exito: #00ff66;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin: 10px 0 5px 0;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }

        .version-tag {
            font-size: 11px;
            background: rgba(255, 0, 127, 0.2);
            color: var(--rosa-nexa);
            padding: 2px 8px;
            border-radius: 20px;
            width: fit-content;
            margin-bottom: 5px;
            font-weight: bold;
            border: 1px solid rgba(255, 0, 127, 0.4);
        }

        .tarjeta-contadores {
            background-color: var(--bg-tarjetas);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            border: 1px solid #1f1f26;
        }

        .contador-item { text-align: center; }
        .contador-numero { font-size: 28px; font-weight: 800; color: var(--rosa-nexa); }
        .contador-numero.exito { color: var(--verde-exito); }
        .contador-etiqueta { font-size: 12px; color: var(--texto-gris); margin-top: 4px; text-transform: uppercase; }

        .tarjeta-progreso {
            background-color: var(--bg-tarjetas);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #1f1f26;
        }

        .espera-segura-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .contenedor-barra { background-color: #1c1c24; border-radius: 6px; height: 12px; width: 100%; overflow: hidden; }
        #barra-progreso-rosa { background: linear-gradient(90deg, #ff007f, #ff5e00); height: 100%; width: 0%; transition: width 0.3s linear; }

        .tarjeta-acciones {
            background-color: var(--bg-tarjetas);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid #1f1f26;
        }

        /* DISEÑO RECEPTOR DE ARCHIVOS MULTIPLE */
        .zona-drop {
            background: #1c1c24;
            border: 2px dashed #33333f;
            padding: 25px 15px;
            border-radius: 8px;
            text-align: center;
            color: var(--texto-gris);
            cursor: pointer;
            font-size: 14px;
        }

        .zona-drop span { color: var(--rosa-nexa); font-weight: bold; }

        button {
            background: linear-gradient(135deg, #ff007f 0%, #b30059 100%);
            color: var(--texto-blanco);
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
        }

        #consola-log {
            background: #000;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            color: #00ff66;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #111;
        }
    </style>
</head>
<body>

    <div>
        <h1>NexaEngine V6 Pro</h1>
        <div class="version-tag">SMART EXTRACTOR MULTI-FORMATO</div>
    </div>

    <div class="tarjeta-contadores">
        <div class="contador-item">
            <div id="contador-pendientes" class="contador-numero">0</div>
            <div class="contador-etiqueta">Pendientes</div>
        </div>
        <div class="contador-item">
            <div id="contador-listos" class="contador-numero exito">0</div>
            <div class="contador-etiqueta">Enviados</div>
        </div>
        <div class="contador-item">
            <div id="contador-total" class="contador-numero" style="color: #61afef;">0</div>
            <div class="contador-etiqueta">Extraídos</div>
        </div>
    </div>

    <div class="tarjeta-progreso">
        <div class="espera-segura-header">
            <span id="espera-segura-txt" style="font-size: 14px;">Esperando archivo (ZIP, Excel, CSV, TXT, Img)...</span>
            <span id="espera-segura-timer" style="color: var(--rosa-nexa); font-weight: bold;">0s</span>
        </div>
        <div class="contenedor-barra">
            <div id="barra-progreso-rosa"></div>
        </div>
    </div>

    <div class="tarjeta-acciones">
        <input type="file" id="file-selector" accept="*/*" style="display: none;" onchange="manejarArchivo(this.files)">
        
        <div class="zona-drop" onclick="document.getElementById('file-selector').click()">
            📱 Toca aquí para importar <span>CUALQUIER ARCHIVO</span><br>
            <small style="color: #777; font-size: 11px; display: block; margin-top: 5px;">Soporta: ZIP, CSV, XLSX, TXT, JSON o Capturas</small>
        </div>

        <textarea id="texto-temporal" placeholder="O pega cualquier texto con números mezclados aquí directamente..." style="background: #1c1c24; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 6px; height: 60px; font-family: monospace; resize: none;"></textarea>
        
        <button onclick="iniciarInyeccionInteligente()">🚀 INICIAR FLUJO EXTRACTOR</button>
    </div>

    <div id="consola-log">Log del sistema: Motor extractor listo...</div>

    <script>
        const LINK_WHATSAPP_GRUPO = "https://chat.whatsapp.com/KQFECehvFsKA66vJiJtkqq";
        const MENSAJE_BASE = "Hola, te dejo la invitación para unirte a nuestro grupo oficial exclusivo de NexaLovers. Este será el grupo responsable de asignarte tu usuario y contraseña gratuito para que hagas tu chamba más fácil 😜";

        let listaContactosFinal = [];

        function logger(texto) {
            const consola = document.getElementById("consola-log");
            consola.innerHTML += `<br>> ${texto}`;
            consola.scrollTop = consola.scrollHeight;
        }

        // EXTRACTOR INTELIGENTE REGEX INTERNO
        // Escanea y captura patrones de 10 a 13 números en bloques limpios o sucios
        function extraerYLimpiarNumeros(textoBruto) {
            logger("Analizando texto con motor inteligente...");
            // Expresión para buscar secuencias numéricas sospechosas de ser teléfonos
            const regexGeneral = /(?:52|521)?\d{10}/g;
            const coincidencias = textoBruto.match(regexGeneral) || [];
            
            let unicos = new Set();

            coincidencias.forEach(num => {
                let limpio = num.replace(/\D/g, '');
                
                // Forzar corrección de clave 521 -> 52
                if (limpio.startsWith('521')) {
                    limpio = '52' + limpio.substring(3);
                }
                
                // Si viene de 10 dígitos, ponerle el prefijo de México
                if (limpio.length === 10) {
                    limpio = '52' + limpio;
                }

                // Validar que tenga el largo correcto bajo tus reglas (12 o 13 dígitos empezando con 52)
                if ((limpio.length === 12 || limpio.length === 13) && limpio.startsWith('52')) {
                    unicos.add(limpio);
                }
            });

            return Array.from(unicos);
        }

        // PROCESADOR MULTI-ARCHIVO
        async function manejarArchivo(files) {
            if (!files.length) return;
            const archivo = files[0];
            logger(`Archivo detectado: ${archivo.name} (${archivo.type || 'S/N'})`);

            // CASO 1: Archivos ZIP
            if (archivo.name.endsWith('.zip') || archivo.type === "application/zip") {
                logger("Abriendo paquete ZIP...");
                try {
                    const zip = await JSZip.loadAsync(archivo);
                    let contenidoAcumulado = "";
                    
                    for (let filename of Object.keys(zip.files)) {
                        if (!zip.files[filename].dir) {
                            let textoArchivo = await zip.files[filename].async("text");
                            contenidoAcumulado += " " + textoArchivo;
                        }
                    }
                    procesarTextoFinal(contenidoAcumulado);
                } catch (err) {
                    logger("Error leyendo el ZIP interno: " + err.message);
                }
            } 
            // CASO 2: Imágenes (Capturas de pantalla) - Módulo de lectura básica por nombre/metadatos o texto plano
            else if (archivo.type.startsWith('image/')) {
                logger("Procesando imagen. Leyendo strings disponibles...");
                // Extracción rápida del nombre por si contiene el número o metadatos de texto
                procesarTextoFinal(archivo.name + " " + archivo.type);
                logger("Nota: Para leer el texto exacto interno de una foto se requiere OCR, usando texto alterno.");
            }
            // CASO 3: CSV, TXT, JSON, Excel básico
            else {
                const lector = new FileReader();
                lector.onload = function(e) {
                    procesarTextoFinal(e.target.result);
                };
                lector.readAsText(archivo);
            }
        }

        function procesarTextoFinal(texto) {
            const numerosExtraidos = extraerYLimpiarNumeros(texto);
            listaContactosFinal = numerosExtraidos.map(num => ({ telefono: num }));
            
            document.getElementById("contador-total").innerText = listaContactosFinal.length;
            document.getElementById("contador-pendientes").innerText = listaContactosFinal.length;
            document.getElementById("contador-listos").innerText = 0;
            
            logger(`¡Extracción exitosa! Encontrados ${listaContactosFinal.length} números válidos de México.`);
        }

        // DISPARADOR SÍNCRONO CON RETARDO HUMANO AUTOMÁTICO
        async function iniciarInyeccionInteligente() {
            // Si hay texto manual en el cuadro, extraer de ahí también
            const textoManual = document.getElementById("texto-temporal").value;
            if (textoManual) {
                procesarTextoFinal(textoManual);
            }

            if (!listaContactosFinal.length) {
                alert("Primero carga un archivo o pega texto que contenga números válidos.");
                return;
            }

            let total = listaContactosFinal.length;
            logger(`Iniciando campaña inteligente anti-bloqueo...`);

            for (let i = 0; i < total; i++) {
                let contacto = listaContactosFinal[i];
                let mensajeCompleto = `${MENSAJE_BASE} ${LINK_WHATSAPP_GRUPO}`;
                let urlWaMe = `https://wa.me/${contacto.telefono}?text=${encodeURIComponent(mensajeCompleto)}`;

                document.getElementById("espera-segura-txt").innerText = `Enviando a: +${contacto.telefono}`;
                window.open(urlWaMe, '_blank');

                document.getElementById("contador-listos").innerText = i + 1;
                document.getElementById("contador-pendientes").innerText = total - (i + 1);

                if (i < total - 1) {
                    // Delay seguro variable entre 25 y 45 segundos
                    let tiempoEspera = Math.floor(Math.random() * (45000 - 25000 + 1)) + 25000;
                    let segundos = Math.round(tiempoEspera / 1000);

                    while (segundos > 0) {
                        document.getElementById("barra-progreso-rosa").style.width = `${(segundos / (tiempoEspera/1000)) * 100}%`;
                        document.getElementById("espera-segura-timer").innerText = `${segundos}s`;
                        await new Promise(r => setTimeout(r, 1000));
                        segundos--;
                    }
                }
            }

            document.getElementById("espera-segura-txt").innerText = "Campaña procesada correctamente.";
            document.getElementById("barra-progreso-rosa").style.width = "100%";
            alert("Flujo de inyección multi-formato terminado.");
        }
    </script>
</body>
</html>
