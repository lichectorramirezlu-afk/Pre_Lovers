<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NexaEngine V18.0 - Queue & Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #050505; --rosa: #ff007f; --verde: #00ff66; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .monitor { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--rosa); }
        .queue-item { font-size: 12px; margin-bottom: 5px; color: #aaa; }
        .btn-lanzar { background: var(--verde); color: #000; padding: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>NexaEngine V18.0 - Live Queue</h1>
    
    <div class="monitor">
        <div id="status-live">Esperando carga...</div>
        <div id="tiempo-restante">Tiempo estimado: --</div>
    </div>

    <input type="file" id="input-masivo" multiple accept="*" style="display: none;">
    <div class="btn-lanzar" onclick="document.getElementById('input-masivo').click()">📁 SUBIR ARCHIVOS A LA FILA</div>

    <div id="queue-list" style="margin-top:20px;"></div>

    <script>
        let fila = [];
        let contactos = new Set();

        document.getElementById('input-masivo').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            // Agrupar en fila
            files.forEach(f => fila.push(f));
            updateQueueUI();
        });

        function updateQueueUI() {
            const list = document.getElementById('queue-list');
            list.innerHTML = "<h3>Archivos en fila:</h3>" + fila.map(f => `<div class="queue-item">⏳ ${f.name}</div>`).join('');
        }

        async function lanzarTrabajo() {
            const startTime = Date.now();
            for(let i = 0; i < fila.length; i++) {
                let file = fila[i];
                
                // Tiempo estimado simple basado en velocidad de proceso
                let tiempoPorArchivo = 3000; 
                let rest = ((fila.length - i) * tiempoPorArchivo) / 1000;
                
                document.getElementById('status-live').innerText = `Procesando: ${file.name}`;
                document.getElementById('tiempo-restante').innerText = `Tiempo estimado restante: ${Math.round(rest)}s`;

                try {
                    let text = "";
                    if(file.type.startsWith('image/')) {
                        const worker = await Tesseract.createWorker('spa');
                        const res = await worker.recognize(file);
                        text = res.data.text;
                        await worker.terminate();
                    } else {
                        text = await file.text();
                    }
                    
                    const nums = text.match(/\d{10,15}/g) || [];
                    nums.forEach(n => {
                        let c = n.replace(/\D/g, '');
                        if(c.length === 10) c = '52' + c;
                        if(c.startsWith('52')) contactos.add(c);
                    });
                } catch(e) { console.error(e); }
            }
            document.getElementById('status-live').innerText = "✅ Trabajo terminado.";
            alert("Proceso completado. Total de contactos únicos: " + contactos.size);
        }
    </script>

    <button class="btn-lanzar" style="margin-top:10px; background: var(--rosa); color:white;" onclick="lanzarTrabajo()">🚀 INICIAR PROCESAMIENTO</button>
</body>
</html>
