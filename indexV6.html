<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaEngine V6 Pro - Full Smart Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-principal: #0a0a0c;
            --bg-tarjetas: #121216;
            --rosa-nexa: #ff007f;
            --texto-blanco: #ffffff;
            --texto-gris: #a0a0ab;
            --verde-exito: #00ff66;
            --azul-info: #61afef;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin: 10px 0 2px 0;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }

        .version-tag {
            font-size: 11px;
            background: rgba(255, 0, 127, 0.15);
            color: var(--rosa-nexa);
            padding: 2px 8px;
            border-radius: 20px;
            width: fit-content;
            margin-bottom: 5px;
            font-weight: bold;
            border: 1px solid rgba(255, 0, 127, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* GRID DE CONTROL DE ESTADÍSTICAS */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .tarjeta-stat {
            background-color: var(--bg-tarjetas);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid #1f1f26;
        }

        .stat-numero {
            font-size: 26px;
            font-weight: 800;
            color: var(--rosa-nexa);
        }
        .stat-numero.unicos { color: var(--verde-exito); }
        .stat-numero.repetidos { color: var(--azul-info); }
        
        .stat-etiqueta {
            font-size: 11px;
            color: var(--texto-gris);
            margin-top: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* CARD DE PROGRESO Y TIMERS */
        .tarjeta-progreso {
            background-color: var(--bg-tarjetas);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #1f1f26;
        }

        .progreso-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13.5px;
        }

        .contenedor-barra {
            background-color: #1c1c24;
            border-radius: 6px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            border: 1px solid #252533;
        }

        #barra-dinamica {
            background: linear-gradient(90deg, #ff007f, #ff5e00);
            height: 100%;
            width: 0%;
            transition: width 0.3s linear;
        }

        /* SECCIÓN DE ACCIONES DIRECTAS */
        .tarjeta-acciones {
            background-color: var(--bg-tarjetas);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid #1f1f26;
        }

        /* DISPARADOR TÁCTIL AUTOMÁTICO */
        .zona-tactil-archivo {
            background: #1c1c24;
            border: 2px dashed #33333f;
            padding: 22px 15px;
            border-radius: 8px;
            text-align: center;
            color: var(--texto-gris);
            cursor: pointer;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .zona-tactil-archivo:active {
            border-color: var(--rosa-nexa);
            background: #22222d;
        }
        .zona-tactil-archivo span {
            color: var(--rosa-nexa);
            font-weight: bold;
        }

        textarea {
            background: #1c1c24;
            color: #fff;
            border: 1px solid #2c2c38;
            padding: 10px;
            border-radius: 6px;
            height: 50px;
            font-family: monospace;
            font-size: 12px;
            resize: none;
        }

        button.btn-ejecutar {
            background: linear-gradient(135deg, #ff007f 0%, #b30059 100%);
            color: var(--texto-blanco);
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.35);
            transition: transform 0.1s;
        }
        button.btn-ejecutar:active {
            transform: scale(0.98);
        }

        /* CONSOLA DE MONITOREO */
        .consola-wrapper {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .consola-titulo {
            font-size: 11px;
            color: var(--texto-gris);
            text-transform: uppercase;
            font-weight: bold;
            padding-left: 2px;
        }
        #consola-log {
            background: #000000;
            border-radius: 8px;
            padding: 12px;
            font-family: "Courier New", monospace;
            font-size: 11px;
            color: var(--verde-exito);
            height: 130px;
            overflow-y: auto;
            border: 1px solid #1a1a24;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div>
        <h1>NexaEngine V6 Pro</h1>
        <div class="version-tag">Engine v6.2 - Extractor Inteligente</div>
    </div>

    <div class="dashboard-grid">
        <div class="tarjeta-stat">
            <div id="c-unicos" class="stat-numero unicos">0</div>
            <div class="stat-etiqueta">Únicos</div>
        </div>
        <div class="tarjeta-stat">
            <div id="c-repetidos" class="stat-numero repetidos">0</div>
            <div class="stat-etiqueta">Repetidos</div>
        </div>
        <div class="tarjeta-stat">
            <div id="c-enviados" class="stat-numero">0</div>
            <div class="stat-etiqueta">Enviados</div>
        </div>
    </div>

    <div class="tarjeta-progreso">
        <div class="progreso-header">
            <span id="txt-estado-motor">Esperando archivo base...</span>
            <span id="txt-timer-seguro" style="color: var(--rosa-nexa); font-weight: bold;">0s</span>
        </div>
        <div class="contenedor-barra">
            <div id="barra-dinamica"></div>
        </div>
    </div>

    <div class="tarjeta-acciones">
        <input type="file" id="archivo-selector" accept="*/*" multiple style="display: none;">
        
        <div class="zona-tactil-archivo" onclick="document.getElementById('archivo-selector').click()">
            📁 Toca aquí para abrir tus <span>ARCHIVOS</span><br>
            <small style="color: #666; font-size: 11px; display: block; margin-top: 4px;">ZIP de MacroDroid, CSV, TXT, Excel o listas</small>
        </div>

        <textarea id="cuadro-manual" placeholder="O pega un bloque de texto sucio con números mezclados aquí..."></textarea>
        
        <button class="btn-ejecutar" onclick="lanzarInyeccionFlujo()">🚀 INICIAR FLUJO PROGRAMADO</button>
    </div>

    <div class="consola-wrapper">
        <div class="consola-titulo">Log del sistema en tiempo real</div>
        <div id="consola-log">> Motor listo para extracción. Importa un archivo...</div>
    </div>

    <script>
        const GRUPO_WHATSAPP = "https://chat.whatsapp.com/KQFECehvFsKA66vJiJtkqq";
        const MENSAJE_PLANTILLA = "Hola, te dejo la invitación para unirte a nuestro grupo oficial exclusivo de NexaLovers. Este será el grupo responsable de asignarte tu usuario y contraseña gratuito para que hagas tu chamba más fácil 😜";

        let poolContactosLimpios = [];
        let setContactosUnicos = new Set();
        let contadorRepetidos = 0;

        // Listener para la captura y lectura automática al elegir archivos
        document.getElementById('archivo-selector').addEventListener('change', async (event) => {
            const archivosCargados = event.target.files;
            if (!archivosCargados.length) return;

            pushLog(`Detectando lote de importación de archivos (${archivosCargados.length})...`);
            
            for (let archivo of archivosCargados) {
                pushLog(`Leyendo datos de: ${archivo.name}`);
                let textoExtraido = "";

                if (archivo.name.endsWith('.zip') || archivo.type === "application/zip") {
                    try {
                        const zipEstructura = await JSZip.loadAsync(archivo);
                        for (let rutaFile of Object.keys(zipEstructura.files)) {
                            if (!zipEstructura.files[rutaFile].dir) {
                                textoExtraido += await zipEstructura.files[rutaFile].async("text") + "\n";
                            }
                        }
                    } catch (errorZip) {
                        pushLog(`Error procesando ZIP interno: ${errorZip.message}`);
                    }
                } else {
                    textoExtraido = await archivo.text();
                }

                ejecutarMotorFiltroRegEx(textoExtraido);
            }

            mostrarResumenFinalVentana();
        });

        // Motor Inteligente de RegEx bajo tus especificaciones (limpieza 52/521 de México)
        function ejecutarMotorFiltroRegEx(textoBruto) {
            // Captura cadenas numéricas aisladas o continuas
            const filtroBase = /(?:52|521)?\d{10}/g;
            const hallazgos = textoBruto.match(filtroBase) || [];

            hallazgos.forEach(numeroEncontrado => {
                let digitosPuros = numeroEncontrado.replace(/\D/g, '');

                // Corrección forzada de clave redundante 521 -> 52
                if (digitosPuros.startsWith('521')) {
                    digitosPuros = '52' + digitosPuros.substring(3);
                }
                // Si es un número local de 10 dígitos, añadirle el prefijo internacional
                else if (digitosPuros.length === 10) {
                    digitosPuros = '52' + digitosPuros;
                }

                // Filtrado estricto por longitud válida (12 o 13 dígitos arrancando con 52)
                if ((digitosPuros.length === 12 || digitosPuros.length === 13) && digitosPuros.startsWith('52')) {
                    if (setContactosUnicos.has(digitosPuros)) {
                        contadorRepetidos++;
                    } else {
                        setContactosUnicos.add(digitosPuros);
                        poolContactosLimpios.push(digitosPuros);
                    }
                }
            });

            // Sincronización inmediata de datos en la interfaz
            document.getElementById('c-unicos').innerText = setContactosUnicos.size;
            document.getElementById('c-repetidos').innerText = contadorRepetidos;
        }

        // Ventana emergente con reporte estadístico estructurado
        function mostrarResumenFinalVentana() {
            pushLog(`--- EXTRACCIÓN FINALIZADA ---`);
            pushLog(`Total Registros Únicos: ${setContactosUnicos.size}`);
            pushLog(`Total Registros Repetidos Descartados: ${contadorRepetidos}`);
            
            alert(`📋 RESUMEN DE EXTRACCIÓN NEXAENGINE\n\n✔ Contactos Nuevos (Únicos): ${setContactosUnicos.size}\n❌ Contactos Repetidos Duplicados: ${contadorRepetidos}\n\nEl sistema ya configuró la cola de envíos automáticamente.`);
        }

        // Bucle síncronizado con retardos humanos variables (Anti-bloqueo)
        async function lanzarInyeccionFlujo() {
            // Absorber texto de la caja manual si el usuario pegó datos directos
            const contenidoManual = document.getElementById('cuadro-manual').value;
            if (contenidoManual.trim() !== "") {
                pushLog("Procesando datos del cuadro de texto manual...");
                ejecutarMotorFiltroRegEx(contenidoManual);
                document.getElementById('cuadro-manual').value = ""; // Limpiar caja
            }

            if (!poolContactosLimpios.length) {
                alert("No hay ningún contacto cargado en la memoria de la app. Primero importa un archivo.");
                return;
            }

            let totalEnvios = poolContactosLimpios.length;
            pushLog(`Iniciando secuencia de inyección automatizada para ${totalEnvios} contactos únicos...`);

            for (let indice = 0; indice < totalEnvios; indice++) {
                let telefonoDestinatario = poolContactosLimpios[indice];
                let textoFinalMensaje = `${MENSAJE_PLANTILLA} ${GRUPO_WHATSAPP}`;
                let enlaceDestinoWhatsApp = `https://wa.me/${telefonoDestinatario}?text=${encodeURIComponent(textoFinalMensaje)}`;

                document.getElementById('txt-estado-motor').innerText = `Enviando a: +${telefonoDestinatario}`;
                
                // Disparo de pestaña controlada hacia WhatsApp
                window.open(enlaceDestinoWhatsApp, '_blank');

                // Actualizar interfaz
                document.getElementById('c-enviados').innerText = indice + 1;

                // Si quedan más números en cola, activar el delay variable protector
                if (indice < totalEnvios - 1) {
                    // Retardo aleatorio paramétrico entre 25,000ms y 45,000ms
                    let milisegundosEspera = Math.floor(Math.random() * (45000 - 25000 + 1)) + 25000;
                    let contadorSegundos = Math.round(milisegundosEspera / 1000);
                    let tiempoBaseEstatico = contadorSegundos;

                    while (contadorSegundos > 0) {
                        let porcentajeProgreso = (contadorSegundos / tiempoBaseEstatico) * 100;
                        document.getElementById('barra-dinamica').style.width = `${porcentajeProgreso}%`;
                        document.getElementById('txt-timer-seguro').innerText = `${contadorSegundos}s`;
                        
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        contadorSegundos--;
                    }
                }
            }

            document.getElementById('txt-estado-motor').innerText = "Flujo terminado.";
            document.getElementById('barra-dinamica').style.width = "100%";
            document.getElementById('txt-timer-seguro').innerText = "✓";
            pushLog("¡Secuencia terminada con éxito!");
            alert("Inyección de campaña finalizada con éxito.");
        }

        function pushLog(mensajeLog) {
            const consolaElemento = document.getElementById('consola-log');
            consolaElemento.innerHTML += `<br>> ${mensajeLog}`;
            consolaElemento.scrollTop = consolaElemento.scrollHeight;
        }
    </script>
</body>
</html>
